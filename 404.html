<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost the trail — Aldacir</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0C211D" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Hanken+Grotesk:wght@400;600&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
      font-family: "Hanken Grotesk", system-ui, sans-serif;
      color: #F1EAD9;
      background:
        radial-gradient(120% 80% at 70% 90%, rgba(233,162,60,0.18), transparent 55%),
        linear-gradient(180deg, #141a33 0%, #0C211D 70%);
    }
    .mark { display: inline-flex; gap: 6px; padding: 8px; border: 1px solid rgba(241,234,217,0.14); border-radius: 50%; background: #06120e; margin-bottom: 2rem; }
    .mark span { width: 14px; height: 14px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #ffd98a, #e9a23c 55%, #9a5e1c); box-shadow: 0 0 12px rgba(233,162,60,0.7); }
    .code { font-family: "Space Mono", monospace; letter-spacing: 0.3em; color: #E9A23C; font-size: 0.85rem; text-transform: uppercase; }
    h1 { font-family: "Fraunces", serif; font-weight: 400; font-size: clamp(2rem, 6vw, 3.4rem); line-height: 1.05; margin: 1rem 0; max-width: 16ch; }
    p { color: #A9B8A6; max-width: 42ch; margin: 0 auto 2rem; }
    a.btn {
      display: inline-flex; align-items: center; gap: 0.5em;
      background: #E9A23C; color: #061410; font-weight: 700;
      padding: 0.9em 1.6em; border-radius: 999px; text-decoration: none;
    }
    a.btn:hover { background: #C77E22; }
  </style>
</head>
<body>
  <main>
    <span class="mark" aria-hidden="true"><span></span><span></span></span>
    <p class="code">404 — off the map</p>
    <h1>This trail doesn't lead anywhere.</h1>
    <p>The page you were looking for has flown off. Let's get you back to where the owls are.</p>
    <a class="btn" href="/">Back to base camp</a>
  </main>
</body>
</html>
